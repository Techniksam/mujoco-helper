name: git-release-install-check

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  install-from-release-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install package from git tag
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -z "$TAG" ]; then
            TAG=${GITHUB_REF_NAME}
          fi
          python -m pip install "git+https://github.com/${REPO}.git@${TAG}"

      - name: Smoke test import
        run: python -c "import mujocohelper; print(mujocohelper.__version__)"